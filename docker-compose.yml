version: '3.8'

services:
  # Frontend - Next.js Web Interface
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_GATEWAY_URL=http://localhost:4000
    depends_on:
      - gateway
      - web-traversal
    networks:
      - ctf-network

  # Gateway - Terminal Bridge (Node.js + Socket.io)
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - FRONTEND_URL=http://localhost:3000
      - FLAGS_PATH=/app/flags.json
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./flags.json:/app/flags.json:ro
    depends_on:
      - shell-backend
    networks:
      - ctf-network

  # Stage 1 - Web Traversal Service (Flask)
  web-traversal:
    build:
      context: ./services/web-traversal
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - FLAG_STAGE1=FLAG{p4th_tr4v3rs4l_0pen_d00r}
    networks:
      - ctf-network

  # Stage 2 & 3 - Shell Backend Service (Ubuntu + Restricted Shell)
  shell-backend:
    build:
      context: ./services/shell-backend
      dockerfile: Dockerfile
    container_name: shell-backend
    environment:
      - FLAG_STAGE2=FLAG{c0mm4nd_1nj3ct10n_p1p3_dr34m}
      - FLAG_STAGE3=FLAG{gtf0_f1nd_r00t_4ccess_2026}
    networks:
      - ctf-network
    # Keep container running
    tty: true
    stdin_open: true

networks:
  ctf-network:
    driver: bridge
